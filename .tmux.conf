# 0 is too far from ` ;)
set -g base-index 1

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on
# Jeff - fix colors
# set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm-256color*:Tc"

set -g status-keys vi
# Large scrollback for verbose tools (e.g. multiple parallel Claude sessions).
# Per-pane, lives in RAM; applies only to panes created after this is set.
set -g history-limit 100000

set -g mode-keys vi
set -g mouse on
set -g focus-events on

# Flag windows with new output in the status bar (handy for watching several
# background sessions at once), but keep it quiet — no popup messages.
setw -g monitor-activity on
set -g visual-activity off

# Make the active pane obvious when many panes are open
set -g pane-active-border-style fg=green

# Let the terminal own the system clipboard (OSC52) — works locally and over SSH
set -g set-clipboard on

bind-key v split-window -h
bind-key s split-window -v

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

bind-key -n M-J resize-pane -D
bind-key -n M-K resize-pane -U
bind-key -n M-H resize-pane -L 2
bind-key -n M-L resize-pane -R 2

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Here for backup, overwritten below - see pane switching with Vim
# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# No delay for escape key press
set -sg escape-time 0

# Reload tmux config
bind r source-file ~/.tmux.conf

# THEME
set -g status-bg black
set -g status-fg white
# set -g window-status-current-bg white
# set -g window-status-current-fg black
# set -g window-status-current-attr bold
set -g status-left '#[fg=green](#S) #(whoami)'
# OS-aware load average in the status line: vm.loadavg on macOS, /proc on Linux
if-shell 'uname | grep -q Darwin' \
  "set -g status-right '#[fg=lightblue]#(sysctl -n vm.loadavg)#[default] #[fg=white]%H:%M#[default]'" \
  "set -g status-right '#[fg=yellow]#(cut -d \" \" -f 1-3 /proc/loadavg)#[default] #[fg=white]%H:%M#[default]'"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n M-h if-shell "$is_vim" "send-keys M-h"  "select-pane -L"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j"  "select-pane -D"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k"  "select-pane -U"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l"  "select-pane -R"
# bind-key -n M-\ if-shell "$is_vim" "send-keys M-\\" "select-pane -l"
# bind-key -T copy-mode-vi M-h select-pane -L
# bind-key -T copy-mode-vi M-j select-pane -D
# bind-key -T copy-mode-vi M-k select-pane -U
# bind-key -T copy-mode-vi M-l select-pane -R
# bind-key -T copy-mode-vi M-\ select-pane -l

# OS-aware copy: pbcopy on macOS, xclip on Linux
if-shell 'uname | grep -q Darwin' \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# TPM (Tmux Plugin Manager) automatic installation
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-logging'

# tmux-logging config
# Keybindings (all require prefix first):
#   prefix + shift-p  — toggle logging on/off for current pane
#   prefix + alt-p    — save complete scrollback history to file
#   prefix + alt-c    — clear pane history and delete log file
# Note: logging is MANUAL — Neovim/TUI panes won't be captured unless you toggle it on
set -g @logging-path "$HOME/.tmux/logs"
set -g @logging-filename "#{session_name}-w#{window_index}p#{pane_index}-%Y%m%dT%H%M%S.log"
set -g @screen-capture-path "$HOME/.tmux/logs"
set -g @save-complete-history-path "$HOME/.tmux/logs"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
